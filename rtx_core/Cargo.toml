[package]
name = "rtx_core"
version = "0.1.0"
authors = ["Deyan Ginev <d.ginev@jacobs-university.de>"]

[lib]
name = "rtx_core"
crate-type = ["rlib", "dylib", "staticlib"]

[dependencies.libarchive-sys]
git = "https://github.com/dginev/libarchive-sys.git"

[dependencies.libxml]
path = "../../rust-libxml"

[dependencies]
libc = "0.2"
rustc-serialize = "0.3"
glob = "0.2"
rand = "0.3"
tempfile = "2.1"
time = "0.1"
lazy_static = "0.1"
regex = "0.1.66"