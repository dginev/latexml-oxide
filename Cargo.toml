[workspace]
members = [
  "latexml_core",
  "latexml_codegen",
  "latexml_package",
  "latexml_math_parser",
  "latexml_contrib",
  "latexml_oxide",
  "latexml_post"
]
resolver = "2"

[profile.release]
debug = true

# Use the local vendored rust-libxml so high-level wrappers we need for
# comment creation, parser init, etc. (added alongside latexml_oxide
# round-17 work) can land without a crates.io release round-trip.
# Upstream when the wrappers have been reviewed.
[patch.crates-io]
libxml = { path = "../rust-libxml" }
