[package]
name = "rtx"
version = "0.1.0"
authors = ["Deyan Ginev <d.ginev@jacobs-university.de>"]

[dependencies.rtx_core]
path = "rtx_core"

[dependencies.rtx_codegen]
path = "rtx_codegen"

[dependencies]
libc = "0.2"
rustc-serialize = "0.3"
glob = "0.2"
rand = "0.3"
tempfile = "2.1"
time = "0.1"
lazy_static = "0.1"
regex = "0.1.66"
libxml = "0.0.747"
log = "0.3"
clippy = { optional = true, version = "=0.0.133" }

[features]

# To link with clippy, build with, the "clippy" features flag, e.g.:
# rustup run nightly cargo test --features clippy
lint = ["clippy"]
