[workspace]
members = [
  "latexml_core",
  "latexml_codegen",
  "latexml_package",
  "latexml_math_parser",
  "latexml_contrib",
  "latexml_oxide",
  "latexml_post"
]
resolver = "2"

[profile.release]
debug = true

# Pin to upstream rust-libxml at the commit that includes the high-level
# wrappers (comment creation, parser init, etc.) added alongside
# latexml_oxide round-17 work. Switched from local path to upstream so CI
# builds can resolve dependencies without a local checkout.
[patch.crates-io]
libxml = { git = "https://github.com/KWARC/rust-libxml", rev = "bfcb5b2f216b6fdb11c041ed0213c6902e0387c4" }
