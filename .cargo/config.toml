[env]
# Increase default stack size for test threads to 16MB (default is 8MB).
# Some tests (colortbls, etc.) trigger deep recursion in the TeX engine
# which causes stack overflow at 8MB, crashing the entire test binary.
RUST_MIN_STACK = "16777216"

# For fresh-test (regenerate kernel dump against ambient TeXLive, then test),
# see `make fresh-test` in the top-level Makefile. Cargo aliases can't chain
# shell commands, so that orchestration lives in make, not here.

# Linker + rustc parallel-frontend tuning for x86_64 Linux.
#
# Linker: `mold` (faster than `lld`, much faster than `bfd`). mold ≥ 1.4 is
# stable for Rust binaries; mold 2.30 ships in Ubuntu. We pass it via cc's
# `-fuse-ld=mold` (gcc ≥ 12 understands this; this system runs gcc 13.3).
# Order of preference: mold > rust-lld > gold > bfd. Saves ~3-5× linker
# wall-clock vs lld on our binary size.
#
# Parallel rustc frontend: `-Zthreads=8` enables the parallel parser /
# borrow-checker / type-checker in nightly rustc, which is single-threaded
# by default. 8 threads is a sweet spot — higher values plateau due to
# lock contention inside rustc. Speeds up the per-crate frontend phase
# 20-40% on this 28-thread CPU. Nightly-only; project already requires
# nightly (CLAUDE.md).
#
# `-Zunstable-options` is the umbrella gate that enables `-Zthreads` as a
# normal flag instead of erroring as unknown.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-Clink-arg=-fuse-ld=mold", "-Zthreads=8", "-Zunstable-options"]
