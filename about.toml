# cargo-about configuration — generates the "RUST DEPENDENCY LICENSES" appendix
# of THIRD-PARTY-NOTICES from the actual lockfile at release time.
#
#   cargo about generate --no-default-features --features runtime-bindings \
#     about.hbs -o THIRD-PARTY-RUST.txt
#
# The distributed binary is built `--no-default-features --features
# runtime-bindings` (docs/release/RELEASE_CRITERIA.md, CLAUDE.md), so generate with the
# same features to attribute exactly the crates that ship. The accepted set
# mirrors deny.toml's [licenses].allow (docs/release/LICENSE_INVENTORY.md §A).

accepted = [
    "CC0-1.0",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
]

# Build- and dev-dependencies are not linked into the shipped binary.
ignore-build-dependencies = true
ignore-dev-dependencies = true
# Private workspace crates are CC0 (our own) — no third-party attribution owed.
private = { ignore = true }
