on:
  # `push` only on main, so a PR branch isn't checked twice (the
  # `pull_request` event already covers branch updates via `synchronize`).
  push:
    branches: [main]
  pull_request:

name: CI

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast-failing quality gate, mirroring the local pre-push hook
  # (.githooks/pre-push). No TeX Live: the engine compiles without on-disk
  # dumps (self-contained / embedded-fallback invariant), so clippy only needs
  # the C library headers, not a texmf tree. Runs in parallel with `test`.
  lint:
    name: lint (fmt + clippy + deny)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_BUILD_JOBS: "2"
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      RUST_BACKTRACE: "1"
    steps:
      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev libxslt1-dev libkpathsea-dev libkpathsea6 mold
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: lint
      - name: rustfmt (check)
        run: cargo fmt --all --check
      - name: clippy (deny warnings, whole workspace + all targets)
        run: cargo clippy --workspace --all-targets --profile ci -- -D warnings
      - name: cargo-deny (advisories + licenses + bans + sources)
        # The action's default arguments inject `--all-features`, so this audits
        # feature-gated trees too (e.g. the off-by-default `cortex` worker deps).
        # Reproduce locally with: cargo deny --all-features check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
      - name: install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - name: cargo-machete (unused dependencies)
        run: cargo machete

  # Miri (UB detector) over the FFI-FREE pure-Rust `unsafe` — the string
  # interner / arena bounds-skip (resolve_unchecked) + re-entrant `&mut *ptr`
  # sites (docs/SAFETY.md categories B/C), the only `unsafe` here with genuine
  # UB potential that Miri can execute. The FFI-bearing unsafe (libc / kpathsea
  # / libxml2 / libxslt dlsym / getrusage / signal) CANNOT run under Miri, so
  # coverage is deliberately scoped via tools/miri_check.sh. Build scripts
  # (libxml/kpathsea/marpa) still compile C natively, hence the dev headers.
  miri:
    name: miri (pure-Rust UB check)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      RUST_BACKTRACE: "1"
    steps:
      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev libxslt1-dev libkpathsea-dev libkpathsea6
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: miri
      - name: miri (scoped arena UB check)
        run: tools/miri_check.sh

  test:
    name: latexml-oxide CI
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      # Runner: ubuntu-latest = 4 vCPU / 16 GB RAM / ~14 GB disk.
      #
      # All build settings live on the dedicated `ci` profile in the
      # workspace `Cargo.toml` (`[profile.ci]` + per-package overrides
      # for `latexml_contrib` / `latexml_package`). That profile is
      # version-controlled and reviewable; previously the same knobs
      # lived as `CARGO_PROFILE_RELEASE_*` env-vars here, which had the
      # side-effect of contaminating the `release` profile used for
      # distribution. Use `--profile ci` from every cargo invocation.
      #
      # Other knobs:
      #  * CARGO_BUILD_JOBS=2 — two rustc workers fit comfortably in
      #    16 GB once the per-package codegen-units split (above) lands.
      #    The previous OOM-kills (runs 25051556164 / 25055232786) came
      #    from `latexml_contrib` codegen at jobs=2 with the default
      #    codegen-units; the profile fix addresses that directly.
      #  * mold linker — ~2-4× faster than ld and streams symbols
      #    rather than slurping into RAM.
      #  * --test-threads=2 — pgf/tikz cells can spike to GB-scale
      #    working sets; conservative parallelism leaves headroom.
      CARGO_BUILD_JOBS: "2"
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      RUST_BACKTRACE: "1"
    steps:
      # Minimal apt set: only what `make formats` + tests actually need.
      # Removed: imagemagick, inkscape (graphics post-processing —
      # not exercised by the test suite); texlive-lang-* (only en/de/fr/
      # ru/el needed by tests, and texlive-lang-european is the heaviest
      # superset). Net: ~1.5 GB less apt download + install time.
      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev libxslt1-dev libkpathsea-dev libkpathsea6 \
            mold \
            texlive texlive-latex-extra texlive-science \
            texlive-bibtex-extra texlive-publishers \
            texlive-lang-german texlive-lang-french texlive-lang-greek \
            texlive-lang-cyrillic
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      # Cheap source-level ratchet: ban NEW string-keyed xml: attribute
      # accessors (the libxml namespaced-attribute footgun). Runs before the
      # expensive build so it fails fast. See docs/XMLID_ACCESSOR_AUDIT_2026-06-08.md.
      - name: lint (xml:id accessor footgun)
        run: tools/lint_xmlid_accessor.sh
      # NOTE: CI intentionally does NOT enable the `cortex` feature.
      # Cortex worker is a production deployment artifact, built separately.
      #
      # All cargo steps below run under the dedicated `ci` profile,
      # which has per-package codegen-units splits to keep peak RSS
      # under 16 GB even on the heaviest binding crates.
      # The engine dumps capture kernel state from `--init=plain.tex` /
      # `--init=latex.ltx` — the core + engine layers only. latexml_package is
      # loaded per-document via \usepackage, NOT during init, so package bindings
      # are NOT in the base dump and are deliberately EXCLUDED from the key —
      # otherwise the common case (editing a package binding) would needlessly
      # bust the cache. The dump is thus a deterministic function of
      # latexml_{core,engine,codegen}/src + the TeX Live release, so most PRs
      # (post, math-parser, PACKAGE bindings, tests, docs) skip the ~8-min
      # dump-generation step. Conservative within that set (over-regenerate,
      # never stale; the test suite catches a bad dump). `runner.os` keeps
      # Linux/macOS caches distinct. Bump `v1` if the dump format changes.
      - name: TeX Live fingerprint (dump cache key)
        id: tlfp
        run: echo "year=$(pdflatex --version 2>/dev/null | sed -n 's:.*TeX Live \([0-9]\{4\}\).*:\1:p' | head -1)" >> "$GITHUB_OUTPUT"
      - name: cache engine dumps
        id: dumps
        uses: actions/cache@v4
        with:
          path: resources/dumps
          key: dumps-v1-${{ runner.os }}-tl${{ steps.tlfp.outputs.year }}-${{ hashFiles('latexml_core/src/**', 'latexml_engine/src/**', 'latexml_codegen/src/**') }}
      - name: make formats
        if: steps.dumps.outputs.cache-hit != 'true'
        env:
          PROFILE: ci
        run: tools/make_formats.sh

      # Build test binaries first (--no-run) so the rustc/linker RSS peak
      # completes and is reclaimed before we spin up test workers. On a
      # warm rust-cache hit this is a no-op; on a cold cache it's the main
      # memory-pressure phase and isolating it from the test phase is
      # what fits the job back inside the 16 GB runner budget.
      - name: build test binaries
        run: cargo test --profile ci --tests --workspace --no-run

      - name: run tests
        run: cargo test --profile ci --tests --workspace -- --test-threads=2

  # macOS mirror of the Linux job above (issue #217). Same `ci` profile,
  # same make-formats → build → run flow; only the platform deps differ:
  # Homebrew instead of apt, and NO mold (the .cargo/config.toml
  # `-fuse-ld=mold` rustflags are gated to x86_64-linux, so the
  # aarch64-darwin link uses the system linker — we simply don't set the
  # mold RUSTFLAGS here). Uses Homebrew's `texlive`, which ships
  # libkpathsea + kpathsea.pc, so the in-process linked kpathsea backend is
  # exercised end-to-end. (MacTeX/BasicTeX's subprocess-`kpsewhich` fallback
  # is documented in README.md but not gated here — it lacks the package set
  # the full suite needs.)
  macos:
    name: latexml-oxide CI (macOS)
    runs-on: macos-15
    # 3 vCPU / 7 GB RAM — tighter than the 16 GB Linux runner, so the same
    # RAM-tuned `ci` profile + jobs=2 apply; the cold build dominates, so
    # allow more wall-clock than the Linux leg.
    timeout-minutes: 120
    env:
      CARGO_BUILD_JOBS: "2"
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      RUST_BACKTRACE: "1"
    steps:
      # libxml2 + libxslt are keg-only on Homebrew; install them and surface
      # their pkgconfig dirs so the libxml/libxslt build scripts find them.
      - name: install dependencies
        run: |
          command -v pkg-config >/dev/null || brew install pkgconf
          brew install libxml2 libxslt texlive
      - name: surface keg-only pkg-config paths
        run: |
          echo "PKG_CONFIG_PATH=$(brew --prefix libxml2)/lib/pkgconfig:$(brew --prefix libxslt)/lib/pkgconfig" >> "$GITHUB_ENV"
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: macos
      # The engine dumps capture kernel state from `--init=plain.tex` /
      # `--init=latex.ltx` — the core + engine layers only. latexml_package is
      # loaded per-document via \usepackage, NOT during init, so package bindings
      # are NOT in the base dump and are deliberately EXCLUDED from the key —
      # otherwise the common case (editing a package binding) would needlessly
      # bust the cache. The dump is thus a deterministic function of
      # latexml_{core,engine,codegen}/src + the TeX Live release, so most PRs
      # (post, math-parser, PACKAGE bindings, tests, docs) skip the ~8-min
      # dump-generation step. Conservative within that set (over-regenerate,
      # never stale; the test suite catches a bad dump). `runner.os` keeps
      # Linux/macOS caches distinct. Bump `v1` if the dump format changes.
      - name: TeX Live fingerprint (dump cache key)
        id: tlfp
        run: echo "year=$(pdflatex --version 2>/dev/null | sed -n 's:.*TeX Live \([0-9]\{4\}\).*:\1:p' | head -1)" >> "$GITHUB_OUTPUT"
      - name: cache engine dumps
        id: dumps
        uses: actions/cache@v4
        with:
          path: resources/dumps
          key: dumps-v1-${{ runner.os }}-tl${{ steps.tlfp.outputs.year }}-${{ hashFiles('latexml_core/src/**', 'latexml_engine/src/**', 'latexml_codegen/src/**') }}
      - name: make formats
        if: steps.dumps.outputs.cache-hit != 'true'
        env:
          PROFILE: ci
        run: tools/make_formats.sh
      - name: build test binaries
        run: cargo test --profile ci --tests --workspace --no-run
      - name: run tests
        run: cargo test --profile ci --tests --workspace -- --test-threads=2
