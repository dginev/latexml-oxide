on: [push, pull_request]

name: CI

jobs:
  test:
    name: latexml-oxide CI
    runs-on: ubuntu-latest
    steps:
      - name: install dependencies
        uses: ryankurte/action-apt@v0.2.0
        with:
          packages: "libxml2-dev libxslt1-dev libkpathsea-dev libkpathsea6 texlive texlive-latex-extra texlive-science"
      - uses: actions/checkout@v3
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: nightly
          override: true
      - name: run tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --release