on: [push, pull_request]

name: CI

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: latexml-oxide CI
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      # Keep peak RAM below the runner's ~16 GB limit (previously OOM'd).
      CARGO_BUILD_JOBS: 2
      CARGO_INCREMENTAL: 0
      # Codegen units split large crates into more, smaller translation
      # units; a LOT less peak memory during the rustc link/codegen stage.
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 32
      CARGO_PROFILE_RELEASE_LTO: "false"
      CARGO_PROFILE_DEV_CODEGEN_UNITS: 256
      RUST_BACKTRACE: 1
      # Fetch via CLI git rather than libgit2 (smaller memory footprint).
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev libxslt1-dev libkpathsea-dev libkpathsea6 \
            texlive texlive-latex-extra texlive-science
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      # NOTE: CI intentionally does NOT enable the `cortex` feature.
      # That feature pulls in pericortex → zmq → zeromq-src (C library build),
      # plus rand, chrono, tempdir, walkdir, zip v0.6 — ~15 min of extra
      # compile time we don't need to validate the core conversion pipeline.
      # Cortex worker is a production deployment artifact, built separately.
      - name: build tests (release, reduced parallelism)
        run: cargo build --release --tests --workspace
      - name: run tests
        run: cargo test --release --tests --workspace -- --test-threads=2
