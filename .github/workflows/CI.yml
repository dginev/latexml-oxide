on: [push, pull_request]

name: CI

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: latexml-oxide CI
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      # Runner: ubuntu-latest = 4 vCPU / 16 GB RAM / ~14 GB disk.
      #
      # All build settings live on the dedicated `ci` profile in the
      # workspace `Cargo.toml` (`[profile.ci]` + per-package overrides
      # for `latexml_contrib` / `latexml_package`). That profile is
      # version-controlled and reviewable; previously the same knobs
      # lived as `CARGO_PROFILE_RELEASE_*` env-vars here, which had the
      # side-effect of contaminating the `release` profile used for
      # distribution. Use `--profile ci` from every cargo invocation.
      #
      # Other knobs:
      #  * CARGO_BUILD_JOBS=2 — two rustc workers fit comfortably in
      #    16 GB once the per-package codegen-units split (above) lands.
      #    The previous OOM-kills (runs 25051556164 / 25055232786) came
      #    from `latexml_contrib` codegen at jobs=2 with the default
      #    codegen-units; the profile fix addresses that directly.
      #  * mold linker — ~2-4× faster than ld and streams symbols
      #    rather than slurping into RAM.
      #  * --test-threads=2 — pgf/tikz cells can spike to GB-scale
      #    working sets; conservative parallelism leaves headroom.
      CARGO_BUILD_JOBS: "2"
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      RUST_BACKTRACE: "1"
    steps:
      # Minimal apt set: only what `make formats` + tests actually need.
      # Removed: imagemagick, inkscape (graphics post-processing —
      # not exercised by the test suite); texlive-lang-* (only en/de/fr/
      # ru/el needed by tests, and texlive-lang-european is the heaviest
      # superset). Net: ~1.5 GB less apt download + install time.
      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev libxslt1-dev libkpathsea-dev libkpathsea6 \
            mold \
            texlive texlive-latex-extra texlive-science \
            texlive-lang-german texlive-lang-french texlive-lang-greek \
            texlive-lang-cyrillic
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      # NOTE: CI intentionally does NOT enable the `cortex` feature.
      # Cortex worker is a production deployment artifact, built separately.
      #
      # All cargo steps below run under the dedicated `ci` profile,
      # which has per-package codegen-units splits to keep peak RSS
      # under 16 GB even on the heaviest binding crates.
      - name: make formats
        env:
          PROFILE: ci
        run: tools/make_formats.sh

      # Build test binaries first (--no-run) so the rustc/linker RSS peak
      # completes and is reclaimed before we spin up test workers. On a
      # warm rust-cache hit this is a no-op; on a cold cache it's the main
      # memory-pressure phase and isolating it from the test phase is
      # what fits the job back inside the 16 GB runner budget.
      - name: build test binaries
        run: cargo test --profile ci --tests --workspace --no-run

      - name: run tests
        run: cargo test --profile ci --tests --workspace -- --test-threads=2
