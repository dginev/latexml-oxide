# Windows bring-up probe — docs/WINDOWS_COMPATIBILITY_PLAN.md.
#
# NOT part of required CI. This workflow is an opt-in, staged compile probe
# for the x86_64-pc-windows-msvc port: each stage reports its own outcome so
# the plan's Phase 1 blockers (libxml2/libxslt vcpkg wiring, the libmarpa
# cc-port) can be watched falling one by one. Stages are EXPECTED to fail
# until their corresponding plan phase lands — that is the point of the
# probe; `continue-on-error` keeps later stages informative.
#
# Promote into CI.yml as a required `windows` job (mirroring the `macos`
# job: TeX Live install, make_formats, full test suite) only at Phase 4.
on:
  workflow_dispatch:
  push:
    branches: [windows-compatibility]

name: windows-bringup

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-probe:
    name: compile probe (x86_64-pc-windows-msvc)
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      RUST_BACKTRACE: "1"
      # Static C libraries + dynamic CRT: the plan's chosen triplet. Static
      # CRT (`x64-windows-static`) is all-or-nothing across every C dep;
      # dynamic libs would break the turnkey single-exe goal.
      VCPKG_TRIPLET: x64-windows-static-md
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: windows-bringup

      # windows-latest runners ship vcpkg preinstalled at
      # VCPKG_INSTALLATION_ROOT. Cache the installed tree — libxml2/libxslt
      # build from source otherwise (~10 min).
      - name: cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}\installed
          key: vcpkg-${{ env.VCPKG_TRIPLET }}-libxml2-libxslt-v1

      - name: vcpkg install libxml2 + libxslt (static)
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg" install `
            "libxml2:$env:VCPKG_TRIPLET" "libxslt:$env:VCPKG_TRIPLET"

      # Surface the vcpkg libs to the libxml/libxslt crate build scripts.
      # Exact env-var wiring is a Phase 1 work item (plan §1.1-1.2); these
      # are the crates' currently-documented knobs and may need upstream PRs.
      - name: export native-lib locations
        run: |
          $prefix = "$env:VCPKG_INSTALLATION_ROOT\installed\$env:VCPKG_TRIPLET"
          "LIBXML2=$prefix\lib\libxml2.lib" >> $env:GITHUB_ENV
          "PKG_CONFIG_PATH=$prefix\lib\pkgconfig" >> $env:GITHUB_ENV
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          "VCPKGRS_TRIPLET=$env:VCPKG_TRIPLET" >> $env:GITHUB_ENV

      # Stage 1 — pure-Rust proc-macro crate; no C deps. Should pass today.
      - name: "stage 1: cargo check -p latexml_codegen"
        continue-on-error: true
        run: cargo check -p latexml_codegen --profile ci

      # Stage 2 — first C-dep frontier: libxml2 + the libmarpa-sys
      # `./configure && make` build (plan Phase 1.3 — the long pole).
      - name: "stage 2: cargo check -p latexml_core"
        continue-on-error: true
        run: cargo check -p latexml_core --profile ci

      # Stage 3 — whole workspace, all targets (adds libxslt via
      # latexml_post, plus every test/bin target).
      - name: "stage 3: cargo check --workspace --all-targets"
        continue-on-error: true
        run: cargo check --workspace --all-targets --profile ci

      # Stage 4 — the turnkey artifact itself.
      - name: "stage 4: cargo build --release --bin latexml_oxide"
        continue-on-error: true
        run: cargo build --release --bin latexml_oxide
