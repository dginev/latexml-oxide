name: Deploy Docs to GitHub Pages

on:
    push:
        branches:
            - master
jobs:
    release:
        name: GitHub Pages
        runs-on: ubuntu-latest

        steps:
            - name: install dependencies
              uses: ryankurte/action-apt@v0.2.0
              with:
                packages: "libxml2-dev libxslt1-dev libkpathsea-dev libkpathsea6 mold"
            - name: Checkout Repository
              uses: actions/checkout@v2

            - name: Install Rust toolchain
              uses: actions-rs/toolchain@v1
              with:
                toolchain: nightly
                profile: minimal
                override: true
                components: rustfmt, rust-src

            - name: Build Documentation
              uses: actions-rs/cargo@v1
              with:
                command: doc
                args: --all --no-deps

            - name: Deploy Documentation
              env:
                PUBLISH_BRANCH: gh-pages
                PUBLISH_DIR: ./target/doc
              run: |
                git config user.name "${GITHUB_ACTOR}"
                git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
                git fetch origin ${PUBLISH_BRANCH}
                git checkout ${PUBLISH_BRANCH}
                find "${GITHUB_WORKSPACE}/${PUBLISH_DIR}" -maxdepth 1 | tail -n +2 | xargs -I % cp -rf % "."
                git add --all
                git commit --allow-empty -m "Automated deployment: $(date -u) ${GITHUB_SHA}"
                git push origin ${PUBLISH_BRANCH}
