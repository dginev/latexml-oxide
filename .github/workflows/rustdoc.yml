name: Deploy Docs to GitHub Pages

on:
    push:
        branches:
            - master

# Deploy step pushes the rendered docs to the gh-pages branch.
permissions:
    contents: write

jobs:
    release:
        name: GitHub Pages
        runs-on: ubuntu-latest

        steps:
            - name: install dependencies
              run: |
                sudo apt-get update
                sudo apt-get install -y --no-install-recommends \
                  libxml2-dev libxslt1-dev libkpathsea-dev libkpathsea6 mold
            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@nightly
              with:
                components: rustfmt, rust-src

            - name: Build Documentation
              run: cargo doc --all --no-deps

            - name: Deploy Documentation
              env:
                PUBLISH_BRANCH: gh-pages
                PUBLISH_DIR: ./target/doc
              run: |
                git config user.name "${GITHUB_ACTOR}"
                git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
                git fetch origin ${PUBLISH_BRANCH}
                git checkout ${PUBLISH_BRANCH}
                find "${GITHUB_WORKSPACE}/${PUBLISH_DIR}" -maxdepth 1 | tail -n +2 | xargs -I % cp -rf % "."
                git add --all
                git commit --allow-empty -m "Automated deployment: $(date -u) ${GITHUB_SHA}"
                git push origin ${PUBLISH_BRANCH}
