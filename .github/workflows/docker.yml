# Build + push the latexml-oxide container images to GHCR from the unified
# root Dockerfile (--target cli / --target worker). Both images BUILD their own
# binary from source and regenerate the kernel dumps against their own TeX Live —
# no dependency on the release .tar.gz/.deb assets.
#
#   cli    → ghcr.io/dginev/latexml-oxide                 (plain latexml_oxide CLI)
#   worker → ghcr.io/dginev/latexml-oxide/cortex-worker   (CorTeX fleet harness)
#
# Three ways in, one per release shape:
#
#   workflow_call      → release.yml's `containers` job, after the release PUBLISHES
#                        (`needs: release`). This is the normal path for a final
#                        X.Y.Z tag: images only exist for a release that succeeded.
#   release published  → a maintainer reviewing the draft release.yml made for an
#                        `X.Y.Z-rcN` tag clicks "Publish".
#   workflow_dispatch  → (re)build any tag on demand.
#
# Why release.yml CALLS this instead of this workflow listening for the final tag:
# a final tag is auto-published by release.yml using GITHUB_TOKEN, and GitHub
# refuses to start a workflow from a GITHUB_TOKEN-authored event (recursion guard;
# workflow_dispatch/repository_dispatch are the only exemptions). So `release:
# published` NEVER reaches this workflow for a final tag — 0.7.4 shipped with no
# images because of exactly that, silently. `published` still works for an RC draft,
# because a human clicking Publish is a real-user event.
#
# Nothing here consumes release.yml's assets (each image builds its own binary and
# dumps) — the `needs: release` gate is about not publishing `:latest` for a release
# that failed, not a data dependency.
#
# Tag resolution is `inputs.ref` (set by BOTH workflow_call and workflow_dispatch)
# falling back to the release tag. Deliberately no `github.ref_name` fallback: on a
# dispatch that would silently resolve to `main` and build the wrong thing, whereas
# an empty value trips the explicit `no tag resolved` guard below.
#
# CLI is multi-arch (amd64 + arm64) via NATIVE runners — each arch compiles on
# its own runner (no QEMU emulation of a fat-LTO build) — then a merge job
# stitches the per-arch digests into one manifest list. The worker is a x86_64
# fleet image, so it is amd64-only. First push of each package creates it private;
# make it public once in the repo's package settings.

name: Publish container images

on:
  workflow_call:
    inputs:
      ref:
        description: 'Tag to build (release.yml passes github.ref_name)'
        required: true
        type: string
      latest:
        description: 'Also move the :latest tag to this build'
        required: false
        default: false
        type: boolean
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag/ref to build (e.g. 0.7.4)'
        required: true
      latest:
        description: 'Also move :latest (only for the CURRENT newest release)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  CLI_IMAGE: ghcr.io/${{ github.repository }}
  WORKER_IMAGE: ghcr.io/${{ github.repository }}/cortex-worker

jobs:
  # ---- CLI image: multi-arch (amd64 + arm64) on native runners ----
  cli:
    name: CLI ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          # `inputs.ref` covers workflow_call AND workflow_dispatch; the release
          # tag covers the RC-publish path. (`github.event.inputs.ref` would be
          # empty under workflow_call — it only populates for dispatch.)
          ref: ${{ inputs.ref || github.event.release.tag_name }}
          fetch-depth: 0
      - name: git sha
        id: meta
        run: echo "gitsha=$(git rev-parse --short=10 HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: build + push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: cli
          platforms: linux/${{ matrix.arch }}
          build-args: |
            GITSHA=${{ steps.meta.outputs.gitsha }}
          outputs: type=image,name=${{ env.CLI_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.arch }}"
      - uses: actions/upload-artifact@v5
        with:
          name: cli-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  cli-merge:
    name: CLI manifest
    runs-on: ubuntu-22.04
    needs: cli
    steps:
      - name: resolve tag
        id: tag
        run: |
          t="${{ inputs.ref || github.event.release.tag_name }}"
          if [ -z "$t" ]; then echo "::error::no tag resolved"; exit 1; fi
          echo "tag=$t" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v6
        with:
          pattern: cli-digest-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: create + push manifest list
        run: |
          t="${{ steps.tag.outputs.tag }}"
          refs=""
          for f in /tmp/digests/*; do refs="$refs ${CLI_IMAGE}@$(cat "$f")"; done
          # :latest is opt-in (release.yml passes latest=true for a final tag).
          # Unconditionally tagging it here would let a rebuild of an OLDER tag drag
          # :latest backwards, and would hand :latest to an RC on the publish path.
          tags=( --tag "${CLI_IMAGE}:${t}" )
          if [ "${{ inputs.latest }}" = "true" ]; then
            tags+=( --tag "${CLI_IMAGE}:latest" )
          else
            echo "note: :latest NOT moved (latest=${{ inputs.latest }})"
          fi
          docker buildx imagetools create "${tags[@]}" $refs
          docker buildx imagetools inspect "${CLI_IMAGE}:${t}"

  # ---- CorTeX fleet worker: amd64 only (x86_64 fleet) ----
  worker:
    name: cortex-worker (amd64)
    runs-on: ubuntu-22.04
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v6
        with:
          # `inputs.ref` covers workflow_call AND workflow_dispatch; the release
          # tag covers the RC-publish path. (`github.event.inputs.ref` would be
          # empty under workflow_call — it only populates for dispatch.)
          ref: ${{ inputs.ref || github.event.release.tag_name }}
          fetch-depth: 0
      - name: resolve tag
        id: tag
        run: |
          t="${{ inputs.ref || github.event.release.tag_name }}"
          if [ -z "$t" ]; then echo "::error::no tag resolved"; exit 1; fi
          echo "tag=$t" >> "$GITHUB_OUTPUT"
      - name: build timestamp + git sha
        id: ts
        run: |
          echo "hosttime=$(date -u +%Y-%m-%dT%H:%MZ)" >> "$GITHUB_OUTPUT"
          echo "gitsha=$(git rev-parse --short=10 HEAD)" >> "$GITHUB_OUTPUT"
      # Same :latest opt-in as the CLI manifest job — see the note there.
      - name: image tags
        id: tags
        run: |
          {
            echo "tags<<TAGS_EOF"
            echo "${WORKER_IMAGE}:${{ steps.tag.outputs.tag }}"
            if [ "${{ inputs.latest }}" = "true" ]; then
              echo "${WORKER_IMAGE}:latest"
            else
              echo "note: :latest NOT moved (latest=${{ inputs.latest }})" >&2
            fi
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: worker
          platforms: linux/amd64
          push: true
          build-args: |
            HOSTTIME=${{ steps.ts.outputs.hosttime }}
            GITSHA=${{ steps.ts.outputs.gitsha }}
          tags: ${{ steps.tags.outputs.tags }}
