[package]
name = "latexml_math_parser"
version = "0.2.0"
authors = ["Deyan Ginev <deyan.ginev@gmail.com>"]
edition = "2021"

[lib]
name = "latexml_math_parser"
crate-type = ["lib"]

[dependencies]
libxml = "0.3.9"
regex = "1.7.1"
log = "0.4"
marpa = { git = "https://github.com/dginev/marpa", branch = "abstract_syntax_forests" }
once_cell = "1.17.0"
rustc-hash = "2.0.0"
latexml_core = { path= "../latexml_core" }
string-interner = {version = "0.19.0", default-features = false, features = ["std", "backends","inline-more"]}
stacker = "0.1.24"
